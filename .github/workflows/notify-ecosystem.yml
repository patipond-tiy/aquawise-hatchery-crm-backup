name: Notify ecosystem umbrella

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to ecosystem umbrella
        env:
          GH_TOKEN: ${{ secrets.ECOSYSTEM_BOT_PAT }}
        run: |
          gh api \
            -X POST \
            /repos/aquawise-tech/aquawise-ecosystem/dispatches \
            -f event_type=submodule-updated \
            -F "client_payload[component]=${{ github.event.repository.name }}" \
            -F "client_payload[sha]=${{ github.sha }}" \
            -F "client_payload[branch]=${{ github.ref_name }}"
