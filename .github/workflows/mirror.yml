name: Mirror to personal backup

# Pushes a complete mirror (all branches, all tags, force-sync) of this repo to
# https://github.com/patipond-tiy/aquawise-nursery-crm-backup on every push,
# every day at 02:00 UTC, and manually via the Actions tab.
#
# One-time setup:
#   1. On the patipond-tiy account, create a fine-grained Personal Access Token
#      with these settings:
#        - Repository access: only `aquawise-nursery-crm-backup`
#        - Permissions:       Contents: Read & write
#                              Metadata: Read-only (auto)
#   2. In this repo (aquawise-tech/aquawise-nursery-crm) go to
#      Settings → Secrets and variables → Actions → New repository secret
#      Name:  MIRROR_TOKEN
#      Value: the PAT from step 1
#   3. Save. The workflow will run on the next push.

on:
  push:
    branches: ['**']
    tags: ['**']
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# Prevent two mirror runs from racing each other.
concurrency:
  group: mirror-to-backup
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror push
    # The mirror copies this workflow into the backup repo too. This guard keeps
    # it running ONLY on the source org repo, so the backup never tries to
    # mirror itself (which always fails the secret check).
    if: github.repository == 'aquawise-tech/aquawise-nursery-crm'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Sanity-check secret
        run: |
          if [ -z "${{ secrets.MIRROR_TOKEN }}" ]; then
            echo "::error::MIRROR_TOKEN secret is not set. See .github/workflows/mirror.yml header for setup."
            exit 1
          fi

      - name: Clone source as bare mirror
        env:
          SRC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --mirror \
            "https://x-access-token:${SRC_TOKEN}@github.com/${{ github.repository }}.git" \
            mirror.git

      - name: Push mirror to backup
        working-directory: mirror.git
        env:
          DST_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          DST_OWNER: patipond-tiy
          DST_REPO: aquawise-nursery-crm-backup
        run: |
          git push --mirror \
            "https://x-access-token:${DST_TOKEN}@github.com/${DST_OWNER}/${DST_REPO}.git"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Mirror result"
            echo "- Source: \`${{ github.repository }}\`@\`${{ github.sha }}\`"
            echo "- Destination: \`patipond-tiy/aquawise-nursery-crm-backup\`"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
