# Supabase CLI config — minimal, exists so `supabase db reset` + `supabase
# test db` can run the pgTAP cross-tenant gate (story S8) in CI. We do NOT
# run a full local stack in dev (mock-mode click-through is the dominant
# dev path per CLAUDE.md); this file scopes the CLI to db + migrations only.
project_id = "aquawise-nursery-crm"

[db]
port = 54322
major_version = 17

[db.pooler]
enabled = false

[db.seed]
enabled = false

[api]
enabled = true
port = 54321
schemas = ["public"]

[auth]
enabled = true

[studio]
enabled = false

[storage]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
