<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AquaWise Hatchery — v3</title>
<style>
/* AquaWise v3 — friendly, rounded, three-column shell */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Backdrop & surfaces */
  --aw3-canvas: #E8E9EE;       /* outer body — soft cool grey */
  --aw3-app: #FFFFFF;          /* the main app shell card */
  --aw3-card: #FFFFFF;          /* inner cards on app */
  --aw3-soft: #F6F6FB;         /* tinted card / chip bg */
  --aw3-soft-2: #EFEEFB;
  --aw3-line: #ECECF2;
  --aw3-line-2: #E0E0EA;

  /* Ink */
  --aw3-ink: #0D0C18;
  --aw3-ink-2: #1F1E2C;
  --aw3-ink-3: #4F4E62;
  --aw3-ink-4: #75748A;
  --aw3-ink-5: #B0AFC2;

  /* Hero accent — AquaWise primary blue */
  --aw3-hero: #004AAD;
  --aw3-hero-2: #003A8C;
  --aw3-hero-soft: #DCE7F7;
  --aw3-hero-tint: #EEF3FB;

  /* Pastel category tints */
  --aw3-lav: #E2EAFB;     --aw3-lav-fg: #2A4DAB;
  --aw3-peach: #FFE7DA;   --aw3-peach-fg: #C2542B;
  --aw3-mint: #DEF4E8;    --aw3-mint-fg: #2B7A50;
  --aw3-sky: #DDECFB;     --aw3-sky-fg: #1F5BB8;
  --aw3-rose: #FDE2EB;    --aw3-rose-fg: #B83767;
  --aw3-amber: #FBEFC9;   --aw3-amber-fg: #8C6900;

  /* Status */
  --aw3-good: #2B7A50;     --aw3-good-tint: #DEF4E8;
  --aw3-bad:  #C2412B;     --aw3-bad-tint: #FFE0DA;
  --aw3-warn: #B07000;     --aw3-warn-tint: #FBEFC9;

  /* Type */
  --font3-thai: 'Noto Sans Thai', 'Plus Jakarta Sans', system-ui, sans-serif;
  --font3-en: 'Plus Jakarta Sans', 'Noto Sans Thai', system-ui, sans-serif;
  --font3-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* Radii */
  --r-sm: 8px;
  --r: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;

  /* Soft shadow */
  --shadow-card: 0 1px 2px rgba(20,19,31,0.04);
  --shadow-pop: 0 8px 24px rgba(20,19,31,0.08);
}

* { box-sizing: border-box; }

html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font3-thai);
  font-size: 16px; line-height: 1.6;
  color: var(--aw3-ink);
  background: var(--aw3-canvas);
  -webkit-font-smoothing: antialiased;
}

.mono { font-family: var(--font3-mono); font-feature-settings: 'tnum'; }
.eyebrow {
  font-family: var(--font3-en);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--aw3-ink-3);
}

::selection { background: var(--aw3-hero); color: #fff; }

/* Inputs */
.aw3-input {
  font-family: inherit; font-size: 16px;
  background: var(--aw3-soft);
  border: 1.5px solid var(--aw3-line-2);
  border-radius: var(--r);
  padding: 14px 20px;
  outline: none; width: 100%;
  color: var(--aw3-ink);
  transition: all 0.15s;
}
.aw3-input:focus {
  background: #fff;
  border-color: var(--aw3-hero);
  box-shadow: 0 0 0 4px var(--aw3-hero-soft);
}

/* Buttons */
.aw3-btn {
  font-family: inherit; font-weight: 700; font-size: 15px;
  background: var(--aw3-ink); color: #fff;
  border: 0; border-radius: var(--r);
  padding: 13px 22px; cursor: pointer;
  min-height: 46px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.15s ease;
}
.aw3-btn:hover { background: var(--aw3-hero); }
.aw3-btn-hero { background: var(--aw3-hero); }
.aw3-btn-hero:hover { background: var(--aw3-hero-2); }
.aw3-btn-ghost {
  background: var(--aw3-soft); color: var(--aw3-ink);
}
.aw3-btn-ghost:hover { background: var(--aw3-soft-2); transform: none; }
.aw3-btn-soft {
  background: var(--aw3-hero-soft); color: var(--aw3-hero);
}
.aw3-btn-soft:hover { background: var(--aw3-hero); color: #fff; transform: none; }
.aw3-btn-sm { padding: 9px 16px; font-size: 14px; min-height: 38px; }

/* Card */
.aw3-card {
  background: var(--aw3-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
}

/* Row hover */
.aw3-row { transition: background 0.12s ease; cursor: pointer; }
.aw3-row:hover { background: var(--aw3-soft); }

/* Reveal — translate only, no opacity flash (older users read fades as stalls) */
@keyframes aw3-rise {
  from { transform: translateY(6px); }
  to { transform: translateY(0); }
}
.aw3-rise { animation: aw3-rise 0.10s ease-out both; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--aw3-ink-5); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--aw3-ink-4); }
::-webkit-scrollbar-track { background: transparent; }

</style>
</head>

<script type="text/babel" data-presets="react" data-module="v3-primitives">
/* global React */
// V3 primitives — soft, rounded, friendly

const V3Mark = ({ size = 28, radius }) => (
  <img src="assets/aquawise-logo.png" alt="AquaWise"
    width={size} height={size}
    style={{ display: 'block', borderRadius: radius != null ? radius : Math.round(size * 0.22), objectFit: 'cover' }}/>
);

// Tonal pill / chip
const V3Chip = ({ children, tone = 'lav', icon, size = 'sm' }) => {
  const tones = {
    lav: { bg: 'var(--aw3-lav)', fg: 'var(--aw3-lav-fg)' },
    peach: { bg: 'var(--aw3-peach)', fg: 'var(--aw3-peach-fg)' },
    mint: { bg: 'var(--aw3-mint)', fg: 'var(--aw3-mint-fg)' },
    sky: { bg: 'var(--aw3-sky)', fg: 'var(--aw3-sky-fg)' },
    rose: { bg: 'var(--aw3-rose)', fg: 'var(--aw3-rose-fg)' },
    amber: { bg: 'var(--aw3-amber)', fg: 'var(--aw3-amber-fg)' },
    soft: { bg: 'var(--aw3-soft)', fg: 'var(--aw3-ink-2)' },
    good: { bg: 'var(--aw3-good-tint)', fg: 'var(--aw3-good)' },
    bad: { bg: 'var(--aw3-bad-tint)', fg: 'var(--aw3-bad)' },
    warn: { bg: 'var(--aw3-warn-tint)', fg: 'var(--aw3-warn)' },
    solid: { bg: 'var(--aw3-ink)', fg: '#fff' },
  };
  const t = tones[tone] || tones.lav;
  const s = size === 'xs' ? { fs: 11, py: 4, px: 9 } : { fs: 12, py: 5, px: 11 };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: `${s.py}px ${s.px}px`,
      background: t.bg, color: t.fg,
      fontFamily: 'inherit', fontSize: s.fs, fontWeight: 600,
      borderRadius: 'var(--r-pill)', whiteSpace: 'nowrap', lineHeight: 1.2,
    }}>
      {icon && <span style={{ fontSize: s.fs - 1, opacity: 0.8 }}>{icon}</span>}
      {children}
    </span>
  );
};

const V3Card = ({ children, pad = 24, style, onClick, hover, accent }) => (
  <div onClick={onClick}
    className={`aw3-card ${onClick || hover ? 'aw3-row' : ''}`}
    style={{
      padding: pad,
      cursor: onClick ? 'pointer' : 'default',
      ...style,
    }}>
    {accent && <div style={{ height: 4, borderRadius: 'var(--r-sm)', background: accent, marginBottom: 16 }}/>}
    {children}
  </div>
);

const V3Section = ({ title, action, children, style }) => (
  <section style={{ marginBottom: 28, ...style }}>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
      <h2 style={{ margin: 0, fontSize: 17, fontWeight: 700, letterSpacing: '-0.01em' }}>{title}</h2>
      {action}
    </div>
    {children}
  </section>
);

// Round arrow button
const V3RoundBtn = ({ onClick, dir = 'right', size = 40, tone = 'soft' }) => {
  const r = { right: 0, left: 180, up: 270, down: 90 }[dir];
  const bg = tone === 'hero' ? 'var(--aw3-hero)' : tone === 'soft' ? 'var(--aw3-soft)' : 'var(--aw3-soft-2)';
  const fg = tone === 'hero' ? '#fff' : 'var(--aw3-ink)';
  return (
    <button onClick={onClick} style={{
      width: size, height: size, borderRadius: '50%',
      background: bg, color: fg, border: 0, cursor: 'pointer',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      transition: 'all 0.15s ease',
    }}>
      <svg width={14} height={14} viewBox="0 0 16 16" style={{ transform: `rotate(${r}deg)` }}>
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </button>
  );
};

// Avatar with optional ring
const V3Avatar = ({ name, size = 36, tone, ring }) => {
  const palettes = ['lav', 'peach', 'mint', 'sky', 'rose', 'amber'];
  const t = tone || palettes[(name || '').charCodeAt(0) % palettes.length];
  const tones = {
    lav: ['#A8C0E6', '#004AAD'],
    peach: ['#FFC8A8', '#C2542B'],
    mint: ['#A6E0BD', '#2B7A50'],
    sky: ['#A6C9F2', '#1F5BB8'],
    rose: ['#F5B5C8', '#B83767'],
    amber: ['#F0D78A', '#8C6900'],
  };
  const [bg, fg] = tones[t];
  const initial = (name || '?').trim()[0]?.toUpperCase() || '?';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg, color: fg,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontWeight: 700, fontSize: size * 0.42,
      boxShadow: ring ? `0 0 0 3px #fff, 0 0 0 ${3 + ring}px var(--aw3-hero)` : 'none',
      flexShrink: 0,
    }}>{initial}</div>
  );
};

// Progress ring (radial)
const V3Ring = ({ value, size = 160, stroke = 10, color = 'var(--aw3-hero)', children }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--aw3-soft)" strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
          strokeDasharray={c} strokeDashoffset={c * (1 - value/100)} strokeLinecap="round"/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {children}
      </div>
    </div>
  );
};

// Soft bar chart (lavender / hero pair)
const V3Bars = ({ values, labels, height = 140, activeIndex }) => {
  const max = Math.max(...values);
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, height, padding: '8px 0' }}>
        {values.map((v, i) => (
          <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'stretch', justifyContent: 'flex-end', gap: 6 }}>
            <div style={{
              height: `${(v / max) * 100}%`,
              background: activeIndex === i ? 'var(--aw3-hero)' : 'var(--aw3-hero-soft)',
              borderRadius: 'var(--r-sm)',
              minHeight: 4,
            }}/>
          </div>
        ))}
      </div>
      {labels && (
        <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
          {labels.map((l, i) => (
            <div key={i} style={{ flex: 1, textAlign: 'center', fontSize: 11, color: 'var(--aw3-ink-4)', fontWeight: activeIndex === i ? 700 : 500 }}>{l}</div>
          ))}
        </div>
      )}
    </div>
  );
};

const V3Grid = ({ cols = 12, gap = 20, children, style }) => (
  <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap, ...style }}>{children}</div>
);
const V3Col = ({ span = 12, children, style }) => (
  <div style={{ gridColumn: `span ${span}`, minWidth: 0, ...style }}>{children}</div>
);

// Photo placeholder — gradient + abstract shapes
const V3Photo = ({ tone = 'lav', height = 140, label }) => {
  const tones = {
    lav: ['#1A66C7', '#A8C0E6'],
    peach: ['#FF8E5A', '#FFC8A8'],
    mint: ['#3F9B6C', '#A6E0BD'],
    sky: ['#3578CC', '#A6C9F2'],
    rose: ['#D04B7B', '#F5B5C8'],
    amber: ['#C29A1F', '#F0D78A'],
  };
  const [a, b] = tones[tone] || tones.lav;
  return (
    <div style={{
      height, borderRadius: 'var(--r)', position: 'relative', overflow: 'hidden',
      background: `linear-gradient(135deg, ${a}, ${b})`,
    }}>
      <svg width="100%" height="100%" viewBox="0 0 200 140" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
        <circle cx="40" cy="100" r="50" fill="rgba(255,255,255,0.15)"/>
        <circle cx="160" cy="40" r="36" fill="rgba(255,255,255,0.12)"/>
        <path d="M0 110 Q 50 80, 100 100 T 200 95 V140 H0 Z" fill="rgba(255,255,255,0.18)"/>
      </svg>
      {label && (
        <div style={{
          position: 'absolute', bottom: 10, left: 12,
          background: 'rgba(255,255,255,0.92)', color: 'var(--aw3-ink)',
          padding: '4px 10px', borderRadius: 'var(--r-pill)',
          fontSize: 11, fontWeight: 600,
        }}>{label}</div>
      )}
    </div>
  );
};

Object.assign(window, {
  V3Mark, V3Chip, V3Card, V3Section, V3RoundBtn, V3Avatar, V3Ring, V3Bars, V3Grid, V3Col, V3Photo,
});

</script>

<script type="text/babel" data-presets="react" data-module="v3-charts">
/* global React */
const { useState: _v3ch } = React;

// =============================================================
// V3 Charts — interactive with hover tooltips
// =============================================================

// Distribution histogram with tooltip + hover
function V3DistChart({ values, labels, height = 180, accent = (i, v) => i >= 7 ? 'var(--aw3-good)' : i >= 5 ? 'var(--aw3-hero)' : 'var(--aw3-warn)' }) {
  const [hover, setHover] = _v3ch(null);
  const max = Math.max(...values, 1);
  const total = values.reduce((a, b) => a + b, 0);

  return (
    <div>
      <div style={{ position: 'relative', display: 'flex', alignItems: 'flex-end', gap: 6, height, padding: '8px 0' }}>
        {/* Y-axis gridlines */}
        <div style={{ position: 'absolute', inset: '8px 0', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', pointerEvents: 'none' }}>
          {[0,1,2,3].map(i => <div key={i} style={{ borderTop: '1px dashed var(--aw3-line)', height: 1 }}/>)}
        </div>
        {values.map((v, i) => (
          <div key={i}
            onMouseEnter={() => setHover(i)}
            onMouseLeave={() => setHover(null)}
            style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'stretch', position: 'relative', cursor: 'pointer' }}>
            <div style={{
              height: `${(v / max) * 100}%`,
              background: hover === i ? 'var(--aw3-ink)' : accent(i, v),
              borderRadius: 'var(--r-sm) var(--r-sm) 4px 4px',
              minHeight: v > 0 ? 4 : 0,
              marginTop: 'auto',
              transition: 'background 0.12s, transform 0.12s',
              transform: hover === i ? 'scaleY(1.04)' : 'scaleY(1)',
              transformOrigin: 'bottom',

// Customers
// =============================================================
function V3Customers({ setPage, setCustomerId }) {
  const { customers, openModal } = window.useV3();
  const [q, setQ] = _v3ds('');
  const [filter, setFilter] = _v3ds('all');
  const filtered = customers.filter(c => {
    if (q && !(c.farm + c.name).toLowerCase().includes(q.toLowerCase())) return false;
    if (filter === 'active' && !c.cycleDay) return false;
    if (filter === 'restock' && c.restockIn == null) return false;
    if (filter === 'concern' && c.status !== 'concern' && c.status !== 'restock-now') return false;
    return true;
  });

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
        <h1 style={{ margin: 0, fontSize: 28, fontWeight: 800, letterSpacing: '-0.01em' }}>ลูกค้า</h1>
        <button className="aw3-btn aw3-btn-hero aw3-btn-sm" onClick={() => openModal('addCustomer')}>+ เพิ่มลูกค้า</button>
      </div>
      <div style={{ color: 'var(--aw3-ink-3)', fontSize: 15, marginBottom: 24 }}>
        {customers.length} ฟาร์ม · {customers.filter(c => c.cycleDay).length} กำลังเลี้ยง
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 18 }}>
        <input className="aw3-input" placeholder="ค้นหาฟาร์มหรือเจ้าของ…"
          value={q} onChange={e => setQ(e.target.value)} style={{ flex: 1 }}/>
        <div style={{ display: 'flex', gap: 4, padding: 4, background: 'var(--aw3-soft)', borderRadius: 'var(--r)' }}>
          {[
            { id: 'all', label: 'ทั้งหมด' },
            { id: 'active', label: 'กำลังเลี้ยง' },
            { id: 'restock', label: 'ใกล้ครบรอบ' },
            { id: 'concern', label: 'น่าห่วง' },
          ].map(t => (
            <button key={t.id} onClick={() => setFilter(t.id)} style={{
              padding: '8px 16px', border: 0, borderRadius: 'var(--r-sm)',
              background: filter === t.id ? '#fff' : 'transparent',
              color: filter === t.id ? 'var(--aw3-ink)' : 'var(--aw3-ink-3)',
              fontFamily: 'inherit', fontSize: 13, fontWeight: 700, cursor: 'pointer',
              boxShadow: filter === t.id ? '0 1px 3px rgba(0,0,0,0.05)' : 'none',
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      <V3Grid cols={2} gap={14}>
        {filtered.map((c, i) => (
          <V3Card key={c.id} pad={18} hover onClick={() => { setCustomerId(c.id); setPage('customer'); }}

            <V3Avatar name={c.farm} tone={['lav','peach','mint','sky','rose','amber'][i % 6]} size={48}/>

              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 15, fontWeight: 700 }}>{c.farm}</span>
                {c.status === 'restock-now' && <V3Chip tone="bad" size="xs">ติดต่อด่วน</V3Chip>}
                {c.status === 'concern' && <V3Chip tone="amber" size="xs">น่าห่วง</V3Chip>}
              </div>
              <div style={{ fontSize: 12, color: 'var(--aw3-ink-3)', marginTop: 2 }}>{c.name} · {c.zone}</div>
              <div style={{ marginTop: 10, display: 'flex', gap: 16 }}>
                <span style={{ fontSize: 12 }}><b>{c.batches}</b> รอบ</span>
                <span style={{ fontSize: 12 }}>มูลค่า ฿{(c.ltv/1000).toFixed(0)}k</span>
                {c.cycleDay && <span style={{ fontSize: 12 }}>วันที่ {c.cycleDay}</span>}
              </div>

        <V3Card pad={22} style={{ border: '1px solid var(--aw3-line)' }}>
          <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>การชำระล่าสุด</h3>
          {[
            { date: '12 เม.ย. 2026', amt: 2490 },
            { date: '12 มี.ค. 2026', amt: 2490 },
            { date: '12 ก.พ. 2026', amt: 2490 },
          ].map((r, i) => (
            <div key={i} style={{
              display: 'flex', justifyContent: 'space-between',
              padding: '12px 0',
              borderTop: i === 0 ? '1px solid var(--aw3-line)' : '1px solid var(--aw3-line)',
              marginTop: i === 0 ? 14 : 0,
              fontSize: 13,
            }}>
              <span style={{ color: 'var(--aw3-ink-3)' }}>{r.date}</span>
              <span style={{ fontWeight: 700 }}>฿{r.amt.toLocaleString()}</span>
            </div>
          ))}
        </V3Card>
      </V3Col>
    </V3Grid>
  );
}

// ============ BATCH DETAIL ============
function V3BatchDetail({ setPage, batchId }) {
  const { batches, openModal, toast } = window.useV3();
  const D = window.AW_DATA;
  const b = batches.find(x => x.id === batchId) || batches[0];
  const buyers = D.CUSTOMERS.slice(0, b.farms);
  const dist = b.dist;
  const distMax = Math.max(...dist);
  const distLabels = ['<50','50-55','55-60','60-65','65-70','70-75','75-80','80-85','85-90','>90'];

  return (
    <div>
      <button onClick={() => setPage('batches')} style={{ background: 'transparent', border: 0, padding: 0, cursor: 'pointer', color: 'var(--aw3-ink-3)', marginBottom: 14, fontSize: 13 }}>← ล็อตทั้งหมด</button>

      <V3Card pad={28} style={{ border: '1px solid var(--aw3-line)', marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 18, flexWrap: 'wrap' }}>
          <V3Avatar name={b.id} size={68} tone={b.pcr === 'clean' ? 'mint' : 'rose'}/>
          <div style={{ flex: 1, minWidth: 220 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <h1 style={{ margin: 0, fontSize: 28, fontWeight: 800, letterSpacing: '-0.01em' }}>ล็อต {b.id}</h1>
              <V3Chip tone={b.pcr === 'clean' ? 'good' : 'bad'} size="xs">PCR {b.pcr === 'clean' ? '✓ สะอาด' : '⚠ พบเชื้อ'}</V3Chip>
            </div>
            <div style={{ fontSize: 14, color: 'var(--aw3-ink-3)', marginTop: 4 }}>
              ลงวันที่ {b.date} · {b.source}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="aw3-btn aw3-btn-soft" onClick={() => toast(`พิมพ์ใบรับรอง ${b.id} แล้ว`)}>พิมพ์ใบรับรอง</button>
            <button className="aw3-btn aw3-btn-hero" onClick={() => openModal('cert', { batch: b })}>ส่งใบรับรอง LINE</button>
          </div>
        </div>
      </V3Card>

      <V3Grid cols={4} gap={14} style={{ marginBottom: 20 }}>
        {[
          { label: 'ผลิต', value: `${(b.plProduced/1000000).toFixed(1)}M`, sub: 'PL ทั้งหมด', tone: 'lav' },
          { label: 'ขายแล้ว', value: `${(b.plSold/1000000).toFixed(1)}M`, sub: `${Math.round(b.plSold/b.plProduced*100)}% ของล็อต`, tone: 'sky' },
          { label: 'ฟาร์มที่ซื้อ', value: b.farms, sub: 'ตามสายไปได้', tone: 'mint' },
          { label: 'D30 เฉลี่ย', value: `${b.meanD30}%`, sub: b.meanD30 >= 80 ? 'เกินเป้า' : 'ต่ำกว่าเป้า', tone: b.meanD30 >= 80 ? 'good' : 'amber' },
        ].map((s, i) => (
          <V3Card key={i} pad={18} style={{ border: '1px solid var(--aw3-line)' }}>
            <V3Chip tone={s.tone} size="xs">{s.label}</V3Chip>
            <div style={{ fontSize: 28, fontWeight: 800, marginTop: 12, letterSpacing: '-0.02em', lineHeight: 1 }}>{s.value}</div>
            <div style={{ fontSize: 12, color: 'var(--aw3-ink-4)', marginTop: 6 }}>{s.sub}</div>
          </V3Card>
        ))}
      </V3Grid>

      <V3Grid cols={12} gap={20}>
        <V3Col span={7}>
          <V3Card pad={24} style={{ border: '1px solid var(--aw3-line)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>การกระจายของอัตรารอด D30</h3>
              <V3Chip tone="soft" size="xs">{b.farms} ฟาร์ม</V3Chip>
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--aw3-ink-3)', marginBottom: 18 }}>
              แต่ละแท่งคือจำนวนฟาร์มในช่วงอัตรารอดนั้น
            </div>
            <window.V3DistChart values={dist} labels={distLabels} height={170}/>
          </V3Card>
        </V3Col>
        <V3Col span={5}>
          <V3Card pad={22} style={{ border: '1px solid var(--aw3-line)', height: '100%' }}>
            <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>ผลตรวจ PCR</h3>
            <div style={{ fontSize: 12, color: 'var(--aw3-ink-3)', marginTop: 4, marginBottom: 18 }}>ตรวจวันที่ {b.date} · ห้องปฏิบัติการ DOFR</div>
            {['WSSV', 'EHP', 'IHHNV', 'TSV'].map((d, i) => {
              const flagged = b.pcr !== 'clean' && d === 'EHP';
              return (
                <div key={d} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '12px 0',
                  borderTop: i > 0 ? '1px solid var(--aw3-line)' : 0,
                }}>
                  <div style={{
                    width: 30, height: 30, borderRadius: '50%',
                    background: flagged ? 'var(--aw3-bad-tint)' : 'var(--aw3-good-tint)',
                    color: flagged ? 'var(--aw3-bad)' : 'var(--aw3-good)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 14, fontWeight: 800,
                  }}>{flagged ? '⚠' : '✓'}</div>
                  <div style={{ flex: 1, fontSize: 14, fontWeight: 700 }}>{d}</div>
                  <V3Chip tone={flagged ? 'bad' : 'good'} size="xs">{flagged ? 'พบเชื้อ' : 'ไม่พบเชื้อ'}</V3Chip>
                </div>
              );
            })}
          </V3Card>
        </V3Col>
      </V3Grid>

      <V3Section title="ฟาร์มที่ซื้อล็อตนี้" style={{ marginTop: 28 }}>
        <V3Card pad={0} style={{ border: '1px solid var(--aw3-line)', overflow: 'hidden' }}>
          {buyers.map((c, i) => (
            <div key={c.id} style={{
              display: 'grid', gridTemplateColumns: '50px 1.5fr 1fr 1fr 1fr 80px',
              alignItems: 'center', gap: 14,
              padding: '14px 20px',
              borderBottom: i < buyers.length - 1 ? '1px solid var(--aw3-line)' : 0,
            }}>
              <V3Avatar name={c.farm} tone={['lav','peach','mint','sky','rose','amber'][i % 6]} size={36}/>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{c.farm}</div>
                <div style={{ fontSize: 11, color: 'var(--aw3-ink-4)' }}>{c.zone}</div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--aw3-ink-4)', fontWeight: 600 }}>ซื้อ</div>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{(180 + i * 30)}k PL</div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--aw3-ink-4)', fontWeight: 600 }}>D30</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: c.d30 >= 80 ? 'var(--aw3-good)' : c.d30 < 70 ? 'var(--aw3-bad)' : 'var(--aw3-ink)' }}>
                  {c.d30 ? `${c.d30}%` : 'รอ'}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--aw3-ink-4)', fontWeight: 600 }}>สถานะ</div>
                <V3Chip tone={c.cycleDay ? 'sky' : 'soft'} size="xs">{c.cycleDay ? `วันที่ ${c.cycleDay}` : 'จบรอบ'}</V3Chip>
              </div>
              <V3RoundBtn dir="right" size={30} tone="soft"/>
            </div>
          ))}
        </V3Card>
      </V3Section>
    </div>
  );
}

window.V3Restock = V3Restock;
window.V3Alerts = V3Alerts;
window.V3Scorecard = V3Scorecard;
window.V3Settings = V3Settings;
window.V3BatchDetail = V3BatchDetail;

</script>

<script type="text/babel" data-presets="react" data-module="v3-app">
/* global React, ReactDOM */
const { useState: _v3as } = React;

function V3App() {
  const [page, setPage] = _v3as('dashboard');
  const [customerId, setCustomerId] = _v3as('C001');
  const [batchId, setBatchId] = _v3as('B-2604-A');

  let body = null;
  if (page === 'dashboard') body = <V3Dashboard setPage={setPage} setCustomerId={setCustomerId} setBatchId={setBatchId}/>;
  else if (page === 'customers') body = <V3Customers setPage={setPage} setCustomerId={setCustomerId}/>;
  else if (page === 'customer') body = <V3CustomerDetail setPage={setPage} customerId={customerId}/>;
  else if (page === 'batches') body = <V3Batches setPage={setPage} setBatchId={setBatchId}/>;
  else if (page === 'batch') body = <V3BatchDetail setPage={setPage} batchId={batchId}/>;
  else if (page === 'restock') body = <V3Restock setPage={setPage} setCustomerId={setCustomerId}/>;
  else if (page === 'alerts') body = <V3Alerts setPage={setPage} setBatchId={setBatchId}/>;
  else if (page === 'scorecard') body = <V3Scorecard/>;
  else if (page === 'settings') body = <V3Settings/>;
  else body = <V3Dashboard setPage={setPage} setCustomerId={setCustomerId} setBatchId={setBatchId}/>;

  return (
    <window.V3Provider>
      <V3Shell page={page} setPage={setPage}>{body}</V3Shell>
    </window.V3Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<V3App/>);

</script>

</body>
